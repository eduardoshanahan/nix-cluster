apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: headlamp

resources:
  - namespace.yaml
  - ingress.yaml
  - admin-token.yaml

helmCharts:
  - name: headlamp
    releaseName: headlamp
    repo: https://kubernetes-sigs.github.io/headlamp/
    version: 0.43.0
    namespace: headlamp
    valuesFile: values.yaml

patches:
  - path: deployment-args-patch.yaml
