apiVersion: v1
kind: ConfigMap
metadata:
  name: control-plane-metrics-proxy
  namespace: observability
data:
  proxy.py: |
    import json
    import os
    import ssl
    import threading
    import urllib.error
    import urllib.request
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    API_BASE = "https://kubernetes.default.svc"
    PORT = int(os.environ.get("PORT", "8080"))

    ROUTES = {
        "/scheduler-metrics": 10259,
        "/controller-manager-metrics": 10257,
    }


    def load_token():
        with open(TOKEN_PATH, "r", encoding="utf-8") as f:
            return f.read().strip()


    def make_api_context():
        ctx = ssl.create_default_context(cafile=CA_PATH)
        return ctx


    def make_insecure_context():
        ctx = ssl.create_default_context()
        ctx.check_hostname = False
        ctx.verify_mode = ssl.CERT_NONE
        return ctx


    def list_control_plane_ips(token, api_ctx):
        req = urllib.request.Request(
            f"{API_BASE}/api/v1/nodes",
            headers={"Authorization": f"Bearer {token}"},
        )
        with urllib.request.urlopen(req, context=api_ctx, timeout=10) as resp:
            nodes = json.loads(resp.read())
        ips = []
        for item in nodes["items"]:
            labels = item.get("metadata", {}).get("labels", {})
            if "node-role.kubernetes.io/control-plane" not in labels:
                continue
            for addr in item.get("status", {}).get("addresses", []):
                if addr["type"] == "InternalIP":
                    ips.append(addr["address"])
                    break
        return ips


    def fetch_node_metrics(ip, port, insecure_ctx):
        url = f"https://{ip}:{port}/metrics"
        req = urllib.request.Request(url)
        with urllib.request.urlopen(req, context=insecure_ctx, timeout=15) as resp:
            return resp.read()


    def aggregate_metrics(port):
        token = load_token()
        api_ctx = make_api_context()
        insecure_ctx = make_insecure_context()
        ips = list_control_plane_ips(token, api_ctx)

        results = [None] * len(ips)

        def worker(idx, ip):
            try:
                results[idx] = fetch_node_metrics(ip, port, insecure_ctx)
            except Exception:
                pass

        threads = [threading.Thread(target=worker, args=(i, ip)) for i, ip in enumerate(ips)]
        for t in threads:
            t.start()
        for t in threads:
            t.join()

        return b"\n".join(r for r in results if r is not None)


    class ProxyHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/healthz":
                body = b"ok\n"
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
                return

            port = ROUTES.get(self.path)
            if port is None:
                body = b"not found\n"
                self.send_response(404)
                self.send_header("Content-Type", "text/plain; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
                return

            try:
                body = aggregate_metrics(port)
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
            except Exception as exc:
                body = f"aggregation failed: {exc}\n".encode("utf-8")
                self.send_response(502)
                self.send_header("Content-Type", "text/plain; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)

        def log_message(self, format, *args):
            return


    if __name__ == "__main__":
        server = ThreadingHTTPServer(("0.0.0.0", PORT), ProxyHandler)
        server.serve_forever()
