apiVersion: apps/v1
kind: Deployment
metadata:
  name: apiserver-metrics-proxy
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apiserver-metrics-proxy
  template:
    metadata:
      annotations:
        homelab.<homelab-domain>/config-revision: "2"
      labels:
        app.kubernetes.io/name: apiserver-metrics-proxy
    spec:
      serviceAccountName: apiserver-metrics-proxy
      containers:
        - name: proxy
          image: python:3.13-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/proxy.py
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: UPSTREAM_URL
              value: https://kubernetes.default.svc/metrics
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: proxy-script
              mountPath: /app
              readOnly: true
      volumes:
        - name: proxy-script
          configMap:
            name: apiserver-metrics-proxy
            defaultMode: 0555
