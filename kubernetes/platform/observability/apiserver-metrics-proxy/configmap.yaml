apiVersion: v1
kind: ConfigMap
metadata:
  name: apiserver-metrics-proxy
  namespace: observability
data:
  proxy.py: |
    import os
    import ssl
    import urllib.error
    import urllib.request
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer


    TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    UPSTREAM_URL = os.environ.get("UPSTREAM_URL", "https://kubernetes.default.svc/metrics")
    PORT = int(os.environ.get("PORT", "8080"))


    def load_token():
        with open(TOKEN_PATH, "r", encoding="utf-8") as token_file:
            return token_file.read().strip()


    class ProxyHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/healthz":
                body = b"ok\n"
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
                return

            if self.path not in ("/metrics", "/apiserver-metrics"):
                body = b"not found\n"
                self.send_response(404)
                self.send_header("Content-Type", "text/plain; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
                return

            try:
                request = urllib.request.Request(
                    UPSTREAM_URL,
                    headers={"Authorization": f"Bearer {load_token()}"},
                )
                context = ssl.create_default_context(cafile=CA_PATH)
                with urllib.request.urlopen(request, context=context, timeout=10) as response:
                    body = response.read()
                    content_type = response.headers.get("Content-Type", "text/plain; version=0.0.4")
                    self.send_response(200)
                    self.send_header("Content-Type", content_type)
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)
            except urllib.error.HTTPError as error:
                body = f"upstream HTTP error: {error.code}\n".encode("utf-8")
                self.send_response(502)
                self.send_header("Content-Type", "text/plain; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
            except Exception as error:
                body = f"upstream request failed: {error}\n".encode("utf-8")
                self.send_response(502)
                self.send_header("Content-Type", "text/plain; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)

        def log_message(self, format, *args):
            return


    if __name__ == "__main__":
        server = ThreadingHTTPServer(("0.0.0.0", PORT), ProxyHandler)
        server.serve_forever()
