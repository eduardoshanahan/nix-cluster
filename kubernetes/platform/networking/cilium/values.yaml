# Cilium values for k3s on ARM64 (Raspberry Pi 4 cluster)
#
# kubeProxyReplacement: true with --disable-kube-proxy in k3s.
# Cilium's BPF TC hooks intercept pod traffic before it reaches iptables, so
# iptables PREROUTING KUBE-SERVICES DNAT (ClusterIP routing) and
# iptables POSTROUTING MASQUERADE (pod egress) both have 0 hits in legacy TC mode.
# Full kube-proxy replacement moves all service routing and masquerading into BPF,
# where Cilium's own data plane can apply them correctly.
#
# k8sServiceHost/k8sServicePort: direct API server endpoint for Cilium bootstrap.
# Cilium needs to reach the API server before ClusterIP routing is active,
# so we give it the physical address (cluster-api DNS resolves to 192.168.1.31).
kubeProxyReplacement: true
k8sServiceHost: cluster-api.hhlab.home.arpa
k8sServicePort: 6443

ipam:
  mode: kubernetes

# Disable use of digest pinning so ARM64 image variants resolve correctly
# without needing to pin a specific digest per architecture.
image:
  useDigest: false

operator:
  image:
    useDigest: false

# Disable the Envoy DaemonSet — it OOM-crashes on Raspberry Pi 4 (ARM64)
# due to tcmalloc requiring 1 GB aligned mmap. Envoy is only used for L7
# (HTTP-level) CiliumNetworkPolicy rules, which are not part of CKAD.
# Standard Kubernetes NetworkPolicy (L3/L4) is enforced by the main cilium
# agent and is unaffected.
envoy:
  enabled: false

# Native routing mode with autoDirectNodeRoutes.
# All 5 nodes are on the same L2 subnet (192.168.1.0/24), so autoDirectNodeRoutes
# can program per-node pod subnet routes directly without VXLAN encapsulation.
# Native routing also fixes the host→pod SNAT issue present in VXLAN mode:
# in VXLAN mode, cil_from_host SNATs host→pod traffic to cilium_host but
# does not de-NAT replies, breaking kubelet liveness/readiness probes.
# In native routing, cil_from_host routes directly to lxc veths without SNAT.
#
# NOTE: native routing failed with TCX attach mode (bpf.enableTCX: true) on
# kernel 6.12 — packets were absorbed. This is safe with legacy TC (bpf.enableTCX: false).
routingMode: native
autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: 10.42.0.0/16

# Install per-endpoint routes (lxc device) instead of a single node-wide pod
# subnet route via cilium_host. Without this, host→pod traffic goes via
# cilium_host → cil_from_host which SNATs the source to the cilium_host IP,
# but the reverse NAT mapping is not stored (RevNAT=0 in CT), so the reply
# is never de-NATted and the original host process never receives it. This
# breaks kubelet liveness/readiness probes and any host-to-pod connectivity.
# With endpointRoutes, host→pod bypasses cil_from_host entirely: each pod
# gets a /32 route via its lxc veth, so no SNAT occurs.
endpointRoutes:
  enabled: true

# The k3s default kubelet directory differs from upstream Kubernetes.
cni:
  chainingMode: none
  exclusive: true

# Explicitly enable NetworkPolicy enforcement (on by default, stated here
# for clarity since this is the primary reason for switching from Flannel).
policyEnforcementMode: default

# Disable TCX (TC eXpress) BPF attachment — on kernel 6.12.47 with TCX,
# packets from pods are absorbed by cil_from_container without being forwarded
# (monitor shows '-> stack' but packets never arrive anywhere visible to tcpdump).
# Legacy TC clsact mode works correctly on this kernel.
bpf:
  enableTCX: false
