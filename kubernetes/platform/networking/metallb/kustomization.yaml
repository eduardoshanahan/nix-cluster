apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: metallb-system

resources:
  - namespace.yaml
  - ip-address-pool.yaml
  - l2-advertisement.yaml

helmCharts:
  - name: metallb
    releaseName: metallb
    repo: https://metallb.github.io/metallb
    version: 0.15.3
    namespace: metallb-system
    valuesFile: values.yaml
