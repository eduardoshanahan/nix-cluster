apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-history-server
  namespace: spark
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-history-server
  namespace: spark
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-history-server
  namespace: spark
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-history-server
subjects:
  - kind: ServiceAccount
    name: spark-history-server
    namespace: spark
