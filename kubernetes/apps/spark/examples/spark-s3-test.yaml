apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: spark-s3-test
  namespace: spark
spec:
  type: Python
  mode: cluster
  image: "apache/spark:3.5.3"
  imagePullPolicy: IfNotPresent
  mainApplicationFile: "local:///opt/spark/examples/src/main/python/pi.py"
  sparkVersion: "3.5.3"

  restartPolicy:
    type: Never

  # Event logging to MinIO S3
  sparkConf:
    "spark.eventLog.enabled": "true"
    "spark.eventLog.dir": "s3a://__MINIO_BUCKET__/spark-events"
    "spark.hadoop.fs.s3a.endpoint": "http://__MINIO_ENDPOINT__:9000"
    "spark.hadoop.fs.s3a.path.style.access": "true"
    "spark.hadoop.fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"

  driver:
    cores: 1
    coreLimit: "1000m"
    memory: "512m"
    serviceAccount: spark-operator
    labels:
      version: 3.5.3
      test: s3-integration
    nodeSelector:
      kubernetes.io/arch: arm64
    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: minio-s3-credentials
            key: AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: minio-s3-credentials
            key: AWS_SECRET_ACCESS_KEY

  executor:
    cores: 1
    instances: 2
    memory: "512m"
    labels:
      version: 3.5.3
      test: s3-integration
    nodeSelector:
      kubernetes.io/arch: arm64
    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: minio-s3-credentials
            key: AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: minio-s3-credentials
            key: AWS_SECRET_ACCESS_KEY
