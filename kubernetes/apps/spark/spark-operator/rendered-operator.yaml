# Source: spark-kubernetes-operator/templates/spark-operator.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-kubernetes-operator-configuration
  namespace: spark
  labels:
    app.kubernetes.io/name: spark-kubernetes-operator
    app.kubernetes.io/component: "operator-config"
    app.kubernetes.io/version: "0.8.0"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: spark-kubernetes-operator-1.6.0
    spark-role: operator
data:
  log4j2.properties: |+
    
    # Logging Overrides
    rootLogger.level=INFO
    rootLogger.appenderRef.stdout.ref = console
    appender.console.type = Console
    appender.console.name = console
    appender.console.target = SYSTEM_ERR
    appender.console.layout.type = PatternLayout
    appender.console.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %X{resource.name} %X{resource.namespace} %C{1.} %m%n%ex
    
  spark-operator.properties: |+
    # Runtime resolved properties
    spark.kubernetes.operator.namespace=spark
    spark.kubernetes.operator.name=spark-kubernetes-operator
    spark.kubernetes.operator.dynamicConfig.enabled=false
    spark.kubernetes.operator.metrics.port=19090
    spark.kubernetes.operator.health.probePort=19091
    spark.kubernetes.operator.watchedNamespaces=spark
    
    # Property Overrides. e.g.
    # spark.kubernetes.operator.reconciler.intervalSeconds=60
    
  metrics.properties: |+
    # Metrics Properties Overrides
