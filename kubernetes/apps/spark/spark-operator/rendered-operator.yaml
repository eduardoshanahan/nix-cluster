apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-kubernetes-operator
  namespace: spark
  labels:
    app.kubernetes.io/name: spark-kubernetes-operator
    app.kubernetes.io/component: "operator-deployment"
    
    app.kubernetes.io/version: "0.8.0"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: spark-kubernetes-operator-1.6.0
    spark-role: operator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: spark-kubernetes-operator
      app.kubernetes.io/component: "operator-deployment"
  template:
    metadata:
      labels:
        spark-role: operator
        app.kubernetes.io/name: spark-kubernetes-operator
        app.kubernetes.io/component: "operator-deployment"
      annotations:
        kubectl.kubernetes.io/default-container: spark-kubernetes-operator
    spec:
      serviceAccountName: spark-operator
      containers:
        - name: spark-kubernetes-operator
          image: docker.io/apache/spark-kubernetes-operator:0.8.0
          imagePullPolicy: IfNotPresent
          command: [ "./docker-entrypoint.sh", "operator" ]
          ports:
            - containerPort: 19091
              name: probe-port
            - containerPort: 19090
              name: metrics-port
          env:
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPERATOR_NAME
              value: spark-kubernetes-operator
            - name: LOG_CONFIG
              value: -Dlog4j.configurationFile=/opt/spark-operator/conf/log4j2.properties
            - name: OPERATOR_JAVA_OPTS
              value: -Dfile.encoding=UTF8 -XX:+ExitOnOutOfMemoryError -XX:+UseParallelGC -XX:InitialRAMPercentage=80 -XX:MaxRAMPercentage=80 -XX:+AlwaysPreTouch -Dio.netty.noUnsafe=true -XX:+UseCompactObjectHeaders
            - name: SPARK_USER
              value: spark
          resources:
            limits:
              cpu: "1"
              ephemeral-storage: 2Gi
              memory: 2Gi
            requests:
              cpu: "1"
              ephemeral-storage: 2Gi
              memory: 2Gi
          startupProbe:
            httpGet:
              port: probe-port
              path: /healthz
            initialDelaySeconds: 0
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              port: probe-port
              path: /readyz
            failureThreshold: 1
            periodSeconds: 10
            timeoutSeconds: 1
          livenessProbe:
            httpGet:
              port: probe-port
              path: /healthz
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
            runAsUser: 185
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: spark-operator-config-volume
              mountPath: /opt/spark-operator/conf
            - name: logs-volume
              mountPath: /opt/spark-operator/logs
      restartPolicy: Always
      volumes:
        - name: spark-operator-config-volume
          configMap:
            name: spark-kubernetes-operator-configuration
        - name: logs-volume
          emptyDir: { }
