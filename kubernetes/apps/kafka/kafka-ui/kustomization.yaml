apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kafka

resources:
  - ingress.yaml

patches:
  - path: startup-probe-patch.yaml

helmCharts:
  - name: kafka-ui
    releaseName: kafka-ui
    repo: https://kafbat.github.io/helm-charts
    version: 1.6.4
    namespace: kafka
    valuesFile: values.yaml
